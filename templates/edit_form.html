{% extends "base.html" %}

{% block title %}Editar Nota{% endblock %}

{% block content %}
<div class="flex justify-center">
    <div class="w-full max-w-2xl bg-white shadow-lg rounded-lg p-8">
        <!-- Botón de retroceso -->
        <div class="mb-6">
            <a href="{{ url_for('notes.home') }}" class="inline-flex items-center text-blue-500 hover:text-blue-700 transition">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                <span class="font-semibold">Volver</span>
            </a>
        </div>

        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">Editar Nota</h1>
        
        <form method="POST" class="space-y-6">
            <!-- Campo Título -->
            <div>
                <label for="title" class="block text-sm font-semibold text-gray-700 mb-2">Título</label>
                <input type="text" name="title" id="title" required value="{{ note.title }}"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="Ingresa el título de tu nota">
            </div>
            
            <!-- Campo Contenido -->
            <div>
                <label for="content" class="block text-sm font-semibold text-gray-700 mb-2">Contenido</label>
                <!-- Input oculto para enviar el HTML al servidor -->
                <input type="hidden" name="content" id="content-hidden" required>
                <!-- Contenedor del editor Quill con altura mínima y estilo responsivo -->
                <div class="border border-gray-300 rounded-lg overflow-hidden bg-white">
                    <div id="editor-container" style="min-height: 250px; font-size: 16px;"></div>
                </div>
            </div>
            
            <!-- Botón de envío -->
            <div class="flex justify-end pt-4">
                <button type="submit"
                    class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition">Editar Nota</button>
            </div>
        </form>
    </div>
</div>

<!-- Div oculto temporal para recuperar de forma segura el HTML original de la nota sin conflictos de renderizado JS -->
<div id="raw-content" class="hidden">{{ note.content|safe }}</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Inicializar Quill
        const quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: 'Escribe el contenido de tu nota...',
            modules: {
                toolbar: [
                    [{ 'font': [] }, { 'size': [] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'script': 'sub'}, { 'script': 'super' }],
                    [{ 'header': [1, 2, 3, false] }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }, { 'indent': '-1' }, { 'indent': '+1' }],
                    [{ 'direction': 'rtl' }, { 'align': [] }],
                    ['link', 'image', 'video'],
                    ['clean']
                ]
            }
        });

        // Modificar botón de imagen para solicitar URL en lugar de subir archivo local (evita Base64 gigante)
        const toolbar = quill.getModule('toolbar');
        toolbar.addHandler('image', function() {
            const range = quill.getSelection();
            const value = prompt('Introduce la URL de la imagen (ej: https://ejemplo.com/imagen.png):');
            if (value) {
                quill.insertEmbed(range.index, 'image', value, Quill.sources.USER);
            }
        });

        // Cargar el contenido HTML actual de la nota en el editor
        const rawContent = document.getElementById('raw-content').innerHTML;
        quill.clipboard.dangerouslyPasteHTML(rawContent);

        // Copiar el contenido HTML del editor Quill al input oculto antes de enviar el formulario
        const form = document.querySelector('form');
        form.addEventListener('submit', function(e) {
            const contentHidden = document.getElementById('content-hidden');
            // Obtener el HTML generado por Quill
            const htmlContent = quill.getSemanticHTML();
            
            // Validar si el editor está vacío (Quill vacío contiene '<p><br></p>')
            const textOnly = quill.getText().trim();
            if (!textOnly) {
                contentHidden.value = '';
            } else {
                contentHidden.value = htmlContent;
            }
        });
    });
</script>
{% endblock %}
