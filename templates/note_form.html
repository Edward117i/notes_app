{% extends "base.html" %}

{% block title %}Crear Nota{% endblock %}

{% block content %}
<div class="flex justify-center">
    <div class="w-full max-w-2xl bg-white shadow-lg rounded-lg p-8">
        <!-- Botón de retroceso -->
        <div class="mb-6">
            <a href="{{ url_for('notes.home') }}" class="inline-flex items-center text-blue-500 hover:text-blue-700 transition">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                <span class="font-semibold">Volver</span>
            </a>
        </div>

        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">Crear Nota</h1>
        
        <form method="POST" class="space-y-6">
            <!-- Campo Título -->
            <div>
                <label for="title" class="block text-sm font-semibold text-gray-700 mb-2">Título</label>
                <input type="text" name="title" id="title" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="Ingresa el título de tu nota">
            </div>
            
            <!-- Campo Contenido -->
            <div>
                <label for="content" class="block text-sm font-semibold text-gray-700 mb-2">Contenido</label>
                <textarea name="content" id="content" required rows="8"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
                    placeholder="Escribe el contenido de tu nota..."></textarea>
            </div>
            
            <!-- Botón de envío -->
            <div class="flex justify-end pt-4">
                <button type="submit"
                    class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition">Crear Nota</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
