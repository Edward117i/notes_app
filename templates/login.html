{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white shadow-md rounded-lg p-6 mt-8">
    <h1 class="text-2xl font-bold mb-6 text-center">Iniciar Sesión</h1>
    <form method="POST" class="space-y-4">
        <div>
            <label for="username" class="block text-gray-700 font-semibold mb-2">Usuario:</label>
            <input 
                type="text" 
                name="username" 
                id="username" 
                required 
                placeholder="Tu nombre de usuario"
                class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
            >
        </div>

        <div>
            <label for="password" class="block text-gray-700 font-semibold mb-2">Contraseña:</label>
            <input 
                type="password" 
                name="password" 
                id="password" 
                required 
                placeholder="Tu contraseña"
                class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
            >
        </div>

        <button 
            type="submit" 
            class="w-full px-4 py-3 bg-blue-500 text-white font-semibold rounded hover:bg-blue-600 transition"
        >
            Iniciar Sesión
        </button>
    </form>

    <p class="text-center mt-6 text-gray-600">
        ¿No tienes cuenta? 
        <a href="{{ url_for('auth.register') }}" class="text-blue-500 font-semibold hover:underline">
            Regístrate aquí
        </a>
    </p>
</div>
{% endblock %}
