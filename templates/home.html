<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina de inicio</title>
</head>
<body>
    <h1>Bienvenido a Flask Notes</h1>
    <ul>
        {% for note in notes %}
    <li>
        {{note.id}} 
        <br>
        {{ note.title }}
        <br>
        {{ note.content }}
        <br>
        <a href="{{ url_for('edit_note', id=note.id) }}">Editar</a>
    </li>
        {% else %}
        <p>Aún no se han creado notas.</p>
        {% endfor %}

        <a href="{{ url_for('create_note') }}">Agregar una nueva nota</a>
    </ul>
</body>
</html>
