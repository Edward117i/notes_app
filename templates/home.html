<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina de inicio</title>
    <style>
        .acciones {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .acciones form {
            margin: 0;
        }
        .acciones a, .acciones button {
            text-decoration: none;
            padding: 5px 10px;
            cursor: pointer;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
        .acciones button {
            border: 1px solid #ddd;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <h1>Bienvenido a Flask Notes</h1>
    <ul id="notesList">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Titulo</th>
                    <th>Contenido</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for note in notes %}
                <tr>
                    <td>{{ note.id }}</td>
                    <td>{{ note.title }}</td>
                    <td>{{ note.content }}</td>
                    <td>
                        <div class="acciones">
                            <a href="{{ url_for('notes.edit_note', id=note.id) }}">✏️Editar</a>
                            <form action="{{ url_for('notes.delete_note', id=note.id) }}" method="POST" onsubmit="return confirm('¿Estás seguro de que deseas eliminar esta nota?');">
                                <button type="submit">🗑️Eliminar</button>
                            </form>
                        </div>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4">Aún no se han creado notas.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <br>
        <a href="{{ url_for('notes.create_note') }}">➕Crear una nueva nota</a>
</body>
</html>
