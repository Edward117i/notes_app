{% extends "base.html" %}

{% block title %}Registro{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white shadow-md rounded-lg p-6 mt-8">
    <h1 class="text-2xl font-bold mb-6 text-center">Crear Cuenta</h1>
    <form method="POST" class="space-y-4">
        <div>
            <label for="username" class="block text-gray-700 font-semibold mb-2">Usuario:</label>
            <input 
                type="text" 
                name="username" 
                id="username" 
                required 
                placeholder="Elige un nombre de usuario"
                class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
            >
        </div>

        <div>
            <label for="email" class="block text-gray-700 font-semibold mb-2">Email:</label>
            <input 
                type="email" 
                name="email" 
                id="email" 
                required 
                placeholder="tu@email.com"
                class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
            >
        </div>

        <div>
            <label for="password" class="block text-gray-700 font-semibold mb-2">Contraseña:</label>
            <input 
                type="password" 
                name="password" 
                id="password" 
                required 
                placeholder="Mínimo 6 caracteres"
                class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
            >
            <p class="text-xs text-gray-500 mt-1">Mínimo 6 caracteres</p>
        </div>

        <div>
            <label for="confirm_password" class="block text-gray-700 font-semibold mb-2">Confirmar Contraseña:</label>
            <input 
                type="password" 
                name="confirm_password" 
                id="confirm_password" 
                required 
                placeholder="Repite tu contraseña"
                class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
            >
        </div>

        <button 
            type="submit" 
            class="w-full px-4 py-3 bg-blue-500 text-white font-semibold rounded hover:bg-blue-600 transition"
        >
            Registrarse
        </button>
    </form>

    <p class="text-center mt-6 text-gray-600">
        ¿Ya tienes cuenta? 
        <a href="{{ url_for('auth.login') }}" class="text-blue-500 font-semibold hover:underline">
            Inicia sesión aquí
        </a>
    </p>
</div>
{% endblock %}
